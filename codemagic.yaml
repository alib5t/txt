workflows:
  ios_unsigned_app:
    name: iOS Unsigned App Fix

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install deps
        script: flutter pub get

      - name: Clean
        script: flutter clean

      - name: Get deps again
        script: flutter pub get

      - name: Disable signing (important)
        script: |
          cd ios
          /usr/libexec/PlistBuddy -c "Set :CODE_SIGN_STYLE Automatic" Runner.xcodeproj/project.pbxproj || true

      - name: Build iOS without signing (force)
        script: |
          flutter build ios --release --no-codesign
          
      - name: Create .app zip
        script: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/iphoneos/Runner.app.zip
